    <ellipse cx="18" cy="26" rx="11" ry="14" fill="#d6286c" stroke="#111111" stroke-width="4"/>
    <ellipse cx="58" cy="26" rx="11" ry="14" fill="#d6286c" stroke="#111111" stroke-width="4"/>
    <ellipse cx="38" cy="36" rx="14" ry="18" fill="#d6286c" stroke="#111111" stroke-width="4"/>
