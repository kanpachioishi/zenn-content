<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi shutdown button pinout</title>
  <desc id="desc">A full 40-pin Raspberry Pi header diagram highlighting GPIO 10 and ground for the LED, plus GPIO 21 and ground for the shutdown button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6f0"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f8f58"/>
      <stop offset="100%" stop-color="#176d45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0d3b27" flood-opacity="0.2"/>
    </filter>
    <style>
      .title { font: 700 34px sans-serif; fill: #17324d; }
      .subtitle { font: 400 18px sans-serif; fill: #49627a; }
      .section { font: 700 20px sans-serif; fill: #17324d; }
      .tiny { font: 700 10px sans-serif; fill: transparent; }
      .pin { font: 700 11px sans-serif; fill: transparent; }
      .pinDark { font: 700 11px sans-serif; fill: transparent; }
      .callout { font: 700 20px sans-serif; fill: #17324d; }
      .body { font: 400 14px sans-serif; fill: #38536a; }
      .label { font: 700 12px sans-serif; fill: #566b7f; }
      .foot { font: 400 12px sans-serif; fill: #4d6479; }
    </style>
  </defs>

  <rect width="1280" height="980" fill="url(#bg)"/>

  <g transform="translate(0 -65)">
  <g filter="url(#shadow)">
    <rect x="60" y="130" width="620" height="810" rx="36" fill="url(#board)"/>
    <circle cx="118" cy="190" r="18" fill="#d2dad3" opacity="0.75"/>
    <circle cx="622" cy="190" r="18" fill="#d2dad3" opacity="0.75"/>
    <circle cx="118" cy="880" r="18" fill="#d2dad3" opacity="0.75"/>
    <circle cx="622" cy="880" r="18" fill="#d2dad3" opacity="0.75"/>
    <rect x="220" y="170" width="300" height="750" rx="22" fill="#10261a" opacity="0.42"/>
  </g>

  <g transform="translate(122 272)">
